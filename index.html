<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trivia – Emprendimiento Digital 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- ============================================================
     TRIVIA EMPRENDIMIENTO DIGITAL 2026
     ============================================================
     GUÍA RÁPIDA DE PERSONALIZACIÓN:
     • Imagen de fondo  → CONFIG.BG_IMAGE / CONFIG.BG_IMAGE_VERTICAL
     • Imagen QR        → CONFIG.QR_IMAGE
     • Tiempo pregunta  → CONFIG.QUESTION_TIME
     • Preguntas        → QUESTION_BANK
     ============================================================ -->

<style>
/* ============================================================
   RESET BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ============================================================
   CSS CUSTOM PROPERTIES – Paleta de marca
   ============================================================ */
:root {
  --yellow:   #fbed64;
  --blue:     #075b8a;
  --magenta:  #ff09e3;
  --cyan:     #00d4ff;
  --bg-dark:  #08081e;
  --bg-mid:   #0d1b4b;
  --white:    #ffffff;
  --correct:  #39ff14;
  --wrong:    #ff3860;
  --card-bg:  rgba(7, 91, 138, 0.28);
  --glow-y:   0 0 30px rgba(251,237,100,0.6);
  --glow-c:   0 0 30px rgba(0,212,255,0.5);
  --glow-m:   0 0 30px rgba(255,9,227,0.6);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg-dark);
  font-family: 'Nunito Sans', sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

#stage {
  position: absolute;
  width:  1920px;
  height: 1080px;
  top:  50%;
  left: 50%;
  transform-origin: center center;
  overflow: hidden;
  color: var(--white);
}

/* ============================================================
   FONDO
   ============================================================ */
#bg-layer {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
#bg-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(ellipse 80% 60% at 15% 110%, rgba(7,91,138,0.60) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 85% -10%,  rgba(255,9,227,0.25) 0%, transparent 70%),
    rgba(8, 8, 30, 0.3);
}

/* Circuito decorativo SVG */
.circuit-svg {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  opacity: 0.10; z-index: 2; pointer-events: none;
}

/* Grilla animada de puntos */
.dot-grid {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background-image: radial-gradient(circle, rgba(0,212,255,0.14) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: driftGrid 30s linear infinite;
}
@keyframes driftGrid {
  0%   { background-position: 0 0; }
  100% { background-position: 48px 48px; }
}

/* Orbes flotantes decorativos */
.orb {
  position: absolute; border-radius: 60%;
  filter: blur(2px); animation: floatOrb linear infinite;
  z-index: 2; pointer-events: none;
}
.orb-1 { width:28px;height:28px; background:radial-gradient(circle,#ff09e3,#075b8a); top:8%;left:92%;  animation-duration:9s;  }
.orb-2 { width:18px;height:18px; background:radial-gradient(circle,#fbed64,#ff09e3); top:85%;left:6%;  animation-duration:12s; }
.orb-3 { width:40px;height:40px; background:radial-gradient(circle,#00d4ff,#075b8a); top:50%;left:97%; animation-duration:15s; }
.orb-4 { width:14px;height:14px; background:radial-gradient(circle,#fbed64,transparent); top:20%;left:2%;animation-duration:8s; }
@keyframes floatOrb {
  0%,100% { transform: translateY(0)     scale(1);    opacity:.9; }
  50%     { transform: translateY(-30px) scale(1.15); opacity:.6; }
}

/* Contenedor de partículas */
.particles-wrap {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 3; overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%;
  animation: particleFly linear forwards;
}
@keyframes particleFly {
  0%   { transform: translate(0,0) scale(1); opacity:1; }
  100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity:0; }
}

/* ============================================================
   APP – CAPA PRINCIPAL
   ============================================================ */
#app {
  position: absolute; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}

.screen {
  display: none;
  width: 1920px; height: 1080px;
  align-items: center; justify-content: center; flex-direction: column;
}
.screen.active { display: flex; }

/* ============================================================
   PANTALLA DE BIENVENIDA – DESKTOP (1920×1080)
   ============================================================ */
#screen-welcome {
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 100px;
  padding: 60px 100px;
}

/* Columna izquierda: logos + main-logo + subtítulo + botón */
.welcome-left {
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 0;
  flex: 1; max-width: 900px;
}

/* ── BARRA DE LOGOS DE MARCA ── */
.brand-logos {
  display: flex;
  align-items: center;
  gap: 34px;
  margin-bottom: 44px;
  animation: fadeDown .7s ease both;
}

/* Contenedores de logo: igualan el área visual sin deformar las marcas */
.brand-logo-box {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  height: 84px;
}

.brand-logo-box--tic {
  width: 92px;
}

.brand-logo-box--innpulsa {
  width: 245px;
}

/* Imagen de logo genérica */
.brand-logo {
  width: 100%;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
  filter: brightness(1.05);
  transition: filter .2s;
}

/* TIC e iNNpulsa mantienen proporción nativa dentro de su caja */
.brand-logo--tic,
.brand-logo--innpulsa {
  width: 100%;
  height: 100%;
}

.brand-divider {
  width:1px;
  height:72px;
  background:rgba(255,255,255,0.22);
  flex: 0 0 auto;
}

/* ── LOGO PRINCIPAL (reemplaza texto "Emprendimiento Digital") ── */
.main-logo {
  display: block;
  max-width: 560px;
  max-height: 190px;
  width: 100%;
  height: auto;
  object-fit: contain;
  margin-bottom: 22px;
  animation: fadeDown .85s ease .08s both;
  filter:
    brightness(1.1)
    drop-shadow(0 0 32px rgba(251,237,100,0.5))
    drop-shadow(0 0 80px rgba(251,237,100,0.2));
}

/* ── Subtítulo Trivia 2026 ── */
.welcome-sub {
  font-size: 26px; font-weight: 600;
  color: rgba(255,255,255,0.55); letter-spacing: 8px;
  text-transform: uppercase; margin-bottom: 56px;
  animation: fadeDown .9s ease .16s both;
}

.kb-hint, .answer-number-wrap { display: none !important; }

/* ── Botón Comenzar ── */
.btn-start {
  font-family: 'Orbitron', sans-serif;
  font-size: 30px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  background: linear-gradient(135deg, var(--yellow) 0%, #f9c200 100%);
  color: #08081e; border: none;
  padding: 26px 96px; border-radius: 60px;
  cursor: pointer; position: relative; overflow: hidden;
  animation: fadeUp .95s ease .24s both, pulseShadow 2.5s ease 1.2s infinite;
  transition: transform .15s ease;
}
.btn-start::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,.28), transparent);
  border-radius:inherit;
}
.btn-start:hover  { transform: scale(1.04); }
.btn-start:active { transform: scale(.97);  }
@keyframes pulseShadow {
  0%,100% { box-shadow: 0 0 30px rgba(251,237,100,.5), 0 8px 40px rgba(0,0,0,.4); }
  50%     { box-shadow: 0 0 70px rgba(251,237,100,.9), 0 8px 40px rgba(0,0,0,.4); }
}

/* ── Columna derecha: QR ── */
.welcome-right {
  display: flex; flex-direction: column;
  align-items: center; gap: 24px;
  animation: fadeUp .9s ease .2s both;
}
.qr-container {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(0,212,255,0.3);
  border-radius: 28px;
  padding: 28px;
  backdrop-filter: blur(14px);
  box-shadow: 0 0 60px rgba(0,212,255,0.15), 0 20px 60px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
}
.qr-container::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--yellow));
}
.qr-img {
  display: block;
  width: 340px; height: 340px;
  border-radius: 12px;
  object-fit: contain;
  background: #fff;
}
.qr-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 4px;
  color: var(--cyan); text-transform: uppercase;
  text-shadow: var(--glow-c); text-align: center;
}
.qr-sublabel {
  font-size: 18px; font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px; text-align: center;
}

/* ============================================================
   PANTALLA DE PREGUNTA
   ============================================================ */
#screen-question {
  flex-direction: column;
  justify-content: flex-start;
  padding: 80px 100px 0; gap: 0;
}

.top-bar {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between;
  padding: 28px 0 20px; flex-shrink: 0;
}
.q-counter {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px; font-weight: 700;
  color: rgba(255,255,255,0.5); letter-spacing: 3px;
}
.q-counter span { font-size:34px; color:var(--cyan); text-shadow:var(--glow-c); }

.score-box {
  display: flex; align-items: center; gap: 14px;
  background: rgba(7,91,138,0.3);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 50px; padding: 10px 32px;
  backdrop-filter: blur(8px);
}
.score-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 17px; font-weight: 600; letter-spacing: 3px;
  color: rgba(255,255,255,.5); text-transform: uppercase;
}
.score-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 40px; font-weight: 900;
  color: var(--yellow); text-shadow: var(--glow-y);
  min-width: 55px; text-align: right;
}
.score-value.pop { animation: scorePop .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes scorePop {
  0%  { transform:scale(1);   }
  50% { transform:scale(1.5); }
  100%{ transform:scale(1);   }
}

.progress-bar-wrap {
  width: 100%; height: 6px;
  background: rgba(255,255,255,.08);
  border-radius: 3px; overflow: hidden;
  flex-shrink: 0; margin-bottom: 26px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  border-radius: 3px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 12px rgba(0,212,255,.6);
}

.question-card {
  width: 100%; max-width: 1340px;
  background: var(--card-bg);
  border: 1px solid rgba(0,212,255,.2);
  border-radius: 26px; padding: 36px 64px;
  text-align: center; backdrop-filter: blur(16px);
  flex-shrink: 0; margin: 0 auto 30px;
  box-shadow: 0 8px 60px rgba(0,0,0,.4),
              inset 0 1px 0 rgba(255,255,255,.06);
  position: relative; overflow: hidden;
}
.question-card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--yellow));
}
.q-category {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 5px;
  text-transform: uppercase; color: var(--cyan);
  margin-bottom: 16px; text-shadow: var(--glow-c);
}
.q-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 38px; font-weight: 700; line-height: 1.3;
  color: var(--white);
}

.answers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 22px; width: 100%; max-width: 1440px;
  margin: 0 auto; flex: 1; padding-bottom: 32px;
}

.answer-btn {
  position: relative; display: flex;
  align-items: center; justify-content: center; gap: 0;
  padding: 0 40px;
  background: rgba(7,91,138,.2);
  border: 2px solid rgba(0,212,255,.25);
  border-radius: 20px; cursor: pointer;
  text-align: center; overflow: hidden;
  transition: border-color .2s, background .2s, transform .12s;
  backdrop-filter: blur(10px); min-height: 106px;
}
.answer-btn::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg,rgba(255,255,255,.04),transparent);
  pointer-events:none;
}
.answer-btn:hover:not(:disabled) {
  border-color: rgba(0,212,255,.65);
  background: rgba(7,91,138,.42);
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 12px 40px rgba(0,0,0,.3), var(--glow-c);
}
.answer-btn:active:not(:disabled) { transform: scale(.98); }
.answer-btn:disabled { cursor: default; }

.answer-text {
  font-family: 'Nunito Sans', sans-serif;
  font-size: 24px; font-weight: 700;
  color: var(--white); line-height: 1.3;
  width: 100%; text-align: center;
}

.answer-btn.correct {
  border-color: var(--correct);
  background: rgba(57,255,20,.15);
  box-shadow: 0 0 40px rgba(57,255,20,.35), 0 8px 30px rgba(0,0,0,.3);
  animation: correctPulse .5s ease;
}
.answer-btn.wrong {
  border-color: var(--wrong);
  background: rgba(255,56,96,.15);
  box-shadow: 0 0 40px rgba(255,56,96,.3), 0 8px 30px rgba(0,0,0,.3);
  animation: wrongShake .5s ease;
}
.answer-btn.dimmed { opacity: .22; }
@keyframes correctPulse {
  0%  {transform:scale(1);}  40%{transform:scale(1.04);}  100%{transform:scale(1);}
}
@keyframes wrongShake {
  0%,100%{transform:translateX(0);}
  15%{transform:translateX(-14px);} 30%{transform:translateX(10px);}
  45%{transform:translateX(-8px);}  60%{transform:translateX(6px);}
  75%{transform:translateX(-4px);}
}

.ripple {
  position:absolute; border-radius:50%; transform:scale(0);
  animation: rippleAnim .6s linear; pointer-events:none;
  background: rgba(0,212,255,.25);
}
@keyframes rippleAnim { to { transform:scale(4); opacity:0; } }

/* ============================================================
   OVERLAYS
   ============================================================ */
.feedback-overlay {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity .3s;
}
.feedback-overlay.show { opacity: 1; }
.feedback-msg {
  font-family: 'Orbitron', sans-serif;
  font-size: 70px; font-weight: 900;
  letter-spacing: 4px; text-transform: uppercase;
  padding: 26px 76px; border-radius: 28px;
  backdrop-filter: blur(20px);
  animation: feedbackPop .4s cubic-bezier(.34,1.56,.64,1);
}
.feedback-msg.correct-msg {
  color: var(--correct); background: rgba(57,255,20,.12);
  border: 3px solid var(--correct);
  box-shadow: 0 0 60px rgba(57,255,20,.5), 0 20px 80px rgba(0,0,0,.5);
  text-shadow: 0 0 40px rgba(57,255,20,.8);
}
.feedback-msg.wrong-msg {
  color: var(--wrong); background: rgba(255,56,96,.12);
  border: 3px solid var(--wrong);
  box-shadow: 0 0 60px rgba(255,56,96,.5), 0 20px 80px rgba(0,0,0,.5);
  text-shadow: 0 0 40px rgba(255,56,96,.8);
}
@keyframes feedbackPop {
  0%   {transform:scale(.6) rotate(-3deg); opacity:0;}
  80%  {transform:scale(1.05) rotate(1deg);}
  100% {transform:scale(1) rotate(0deg); opacity:1;}
}

.explanation-box {
  position: absolute; bottom: 44px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(7,91,138,.5);
  border: 1px solid rgba(0,212,255,.3);
  border-radius: 20px; padding: 18px 56px;
  font-family: 'Nunito Sans', sans-serif;
  font-size: 22px; font-weight: 700;
  color: rgba(255,255,255,.85); text-align: center;
  backdrop-filter: blur(16px); z-index: 99;
  opacity: 0; transition: opacity .4s, transform .4s;
  max-width: 1320px; white-space: nowrap;
}
.explanation-box.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}
.explanation-box .exp-label {
  font-family: 'Orbitron', sans-serif; font-size: 12px;
  font-weight: 700; letter-spacing: 4px; color: var(--cyan);
  margin-bottom: 5px; text-transform: uppercase;
}

.countdown-ring {
  position: absolute; top: 34px; left: 50%;
  transform: translateX(-50%); z-index: 50;
}
.countdown-ring svg { transform: rotate(-90deg); }
.countdown-ring-track { stroke: rgba(255,255,255,.08); }
.countdown-ring-fill {
  stroke: var(--cyan); stroke-dasharray: 188.5;
  stroke-dashoffset: 188.5;
  transition: stroke-dashoffset 1s linear, stroke .3s;
  filter: drop-shadow(0 0 6px rgba(0,212,255,.8));
}
.countdown-num {
  position: absolute; top:50%; left:50%;
  transform: translate(-50%,-50%);
  font-family: 'Orbitron', sans-serif;
  font-size: 24px; font-weight: 700; color: var(--cyan);
  text-shadow: var(--glow-c);
}

/* ============================================================
   PANTALLA DE RESULTADOS
   ============================================================ */
#screen-results {
  flex-direction: column; gap: 0; padding: 50px 120px;
}
.results-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 62px; font-weight: 900; letter-spacing: -1px;
  text-align: center; margin-bottom: 10px;
  animation: fadeDown .7s ease both;
}
.results-title span { color: var(--yellow); text-shadow: var(--glow-y); }
.results-subtitle {
  font-size: 22px; color: rgba(255,255,255,.5); letter-spacing: 5px;
  text-align: center; text-transform: uppercase; margin-bottom: 52px;
  animation: fadeDown .7s ease .1s both;
}
.score-display {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 56px; animation: fadeUp .8s ease .2s both;
}
.score-circle {
  position: relative; width: 250px; height: 250px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.score-circle-bg {
  position: absolute; inset: 0; border-radius: 50%;
  animation: spinIn 1s ease .3s both;
}
.score-circle-inner {
  position: absolute; inset: 15px; border-radius: 50%;
  background: #08081e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  box-shadow: inset 0 4px 20px rgba(0,0,0,.5);
}
.score-big {
  font-family: 'Orbitron', sans-serif;
  font-size: 76px; font-weight: 900;
  color: var(--yellow); text-shadow: var(--glow-y); line-height: 1;
}
.score-total {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px; font-weight: 600; color: rgba(255,255,255,.4);
}
@keyframes spinIn {
  from {transform:rotate(-90deg); opacity:0;}
  to   {transform:rotate(0);      opacity:1;}
}
.result-message { text-align: center; margin-left: 60px; }
.result-emoji {
  font-size: 76px; line-height: 1; margin-bottom: 14px;
  animation: bounceIn .6s cubic-bezier(.34,1.56,.64,1) .6s both;
}
@keyframes bounceIn {
  from {transform:scale(0);opacity:0;} to {transform:scale(1);opacity:1;}
}
.result-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 38px; font-weight: 800; color: var(--white); margin-bottom: 10px;
}
.result-desc {
  font-size: 21px; color: rgba(255,255,255,.55);
  max-width: 480px; line-height: 1.5;
}

.results-actions {
  display: flex; gap: 28px;
  animation: fadeUp .8s ease .5s both;
}
.btn-action {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; border: none;
  padding: 24px 68px; border-radius: 50px;
  cursor: pointer; transition: transform .15s, box-shadow .2s;
  overflow: hidden;
}
.btn-action:hover  { transform: translateY(-4px) scale(1.03); }
.btn-action:active { transform: scale(.97); }
.btn-restart {
  background: linear-gradient(135deg, var(--yellow), #f9c200);
  color: #08081e;
  box-shadow: 0 0 30px rgba(251,237,100,.4), 0 8px 30px rgba(0,0,0,.4);
}
.btn-restart:hover {
  box-shadow: 0 0 55px rgba(251,237,100,.75), 0 12px 40px rgba(0,0,0,.4);
}

/* ============================================================
   ANIMACIONES COMPARTIDAS
   ============================================================ */
@keyframes fadeDown {
  from {transform:translateY(-30px); opacity:0;}
  to   {transform:translateY(0);     opacity:1;}
}
@keyframes fadeUp {
  from {transform:translateY(30px); opacity:0;}
  to   {transform:translateY(0);    opacity:1;}
}
.q-enter { animation: qEnter .42s cubic-bezier(.22,1,.36,1) both; }
@keyframes qEnter {
  from {transform:translateX(80px) scale(.97); opacity:0;}
  to   {transform:translateX(0) scale(1);      opacity:1;}
}

/* ============================================================
   ADAPTIVE — LAYOUT VERTICAL 4:5
   ─────────────────────────────────────────────────────────
   Diseño principal para pantallas móviles y verticales.
   Optimizado para proporción 4:5 (ej. 1080×1350px).
   ============================================================ */
#stage.adaptive {
  position: fixed;
  inset: 0;
  top: 0 !important;
  left: 0 !important;
  width: 100vw;
  height: 100dvh;
  min-height: 100svh;
  transform: none !important;

<script>
/* ============================================================
   CONFIGURACIÓN GLOBAL
   ============================================================ */
const CONFIG = {
  /* Tiempo por pregunta (segundos) */
  QUESTION_TIME: 14,

  /* Imagen de fondo – landscape para desktop */
  BG_IMAGE: './assets/images/fondo.jpg',

  /* Imagen de fondo – para layout vertical/adaptive */
  BG_IMAGE_VERTICAL: './assets/images/fondo_vertical.png',

  /* Imagen del QR */
  QR_IMAGE: './assets/images/qr-emprendimiento.png',

  /* Texto debajo del QR */
  QR_SUBLABEL: '',
};

/* ============================================================
   BANCO DE PREGUNTAS
   ============================================================ */
const QUESTION_BANK = [
  {
    category: "🧠 Design Thinking",
    text: "¿Para qué sirve el Design Thinking?",
    options: [
      "Reducir costos de producción",
      "Mejorar compatibilidad técnica",
      "Diseñar marcas atractivas",
      "Crear soluciones centradas en el usuario",
    ],
    correctText: "Crear soluciones centradas en el usuario",
    explanation: "Empatía con el usuario para diseñar soluciones relevantes.",
  },
  {
    category: "🚀 Innovación",
    text: "¿Qué es un MVP?",
    options: [
      "Una campaña de marketing",
      "Un producto final completo",
      "Un plan financiero",
      "Una versión lista para validación real",
    ],
    correctText: "Una versión lista para validación real",
    explanation: "Permite probar una idea real con el menor esfuerzo posible.",
  },
  {
    category: "📈 Startups",
    text: '¿Qué significa "pivotar" en una startup?',
    options: [
      "Financiarse sin inversionistas",
      "Cambiar la estrategia según el mercado",
      "Entrar a una incubadora",
      "Expandirse rápido",
    ],
    correctText: "Cambiar la estrategia según el mercado",
    explanation: "Es ajustar el rumbo con base en lo aprendido.",
  },
  {
    category: "💡 Tecnología",
    text: "¿Qué es una tecnología disruptiva?",
    options: [
      "Una mejora pequeña",
      "Una herramienta exclusiva",
      "Una innovación que transforma mercados",
      "Un software avanzado",
    ],
    correctText: "Una innovación que transforma mercados",
    explanation: "Cambia las reglas del juego y crea nuevas oportunidades.",
  },
  {
    category: "📊 Negocios Digitales",
    text: "¿Qué significa escalabilidad?",
    options: [
      "Contratar más personal",
      "Crecer en ingresos y mantener costos bajos",
      "Tener oficinas grandes",
      "Guardar datos en la nube",
    ],
    correctText: "Crecer en ingresos y mantener costos bajos",
    explanation: "Crecer en ventas a mayor ritmo que los gastos.",
  },
];

/* ============================================================
   MOTOR RESPONSIVO — Viewport Scaling
   ============================================================ */
const DESIGN_W = 1920;
const DESIGN_H = 1080;
const stageEl  = document.getElementById('stage');
const bgLayer  = document.getElementById('bg-layer');
let   currentScale = 1;
let   isAdaptiveMode = false;
let   currentBgSrc = '';

function isVerticalFormat() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  return vh > vw;
}

function getBackgroundForCurrentFormat() {
  return isVerticalFormat() ? CONFIG.BG_IMAGE_VERTICAL : CONFIG.BG_IMAGE;
}

function updateBackgroundByFormat() {
  const bgSrc = getBackgroundForCurrentFormat();
  if (bgSrc && bgSrc !== currentBgSrc) {
    currentBgSrc = bgSrc;
    bgLayer.style.backgroundImage = `url("${bgSrc}")`;
  }
}

function shouldUseAdaptiveLayout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  return vw <= 900 || vh > vw * 1.15;
}

function rescale() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const adaptive = shouldUseAdaptiveLayout();

  /* Cambiar fondo según orientación real:
     vertical  → fondo_vertical.png
     horizontal → fondo.jpg */
  updateBackgroundByFormat();

  if (adaptive !== isAdaptiveMode) {
    isAdaptiveMode = adaptive;
  }

  if (adaptive) {
    currentScale = 1;
    stageEl.classList.add('adaptive');
    stageEl.style.top = '0';
    stageEl.style.left = '0';
    stageEl.style.transform = 'none';
    return;
  }

  stageEl.classList.remove('adaptive');
  stageEl.style.top = '50%';
  stageEl.style.left = '50%';
  currentScale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
  stageEl.style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

rescale();
window.addEventListener('resize', rescale);
window.addEventListener('orientationchange', () => setTimeout(rescale, 120));

function toStage(clientX, clientY) {
  const r = stageEl.getBoundingClientRect();
  return {
    x: (clientX - r.left) / currentScale,
    y: (clientY - r.top)  / currentScale,
  };
}

/* ============================================================
   INICIALIZACIÓN DE RECURSOS
   ============================================================ */
(function initResources() {
  const qrEl = document.getElementById('qrImg');

  /* Fondo inicial según orientación real */
  const initialBg = getBackgroundForCurrentFormat();
  isAdaptiveMode = shouldUseAdaptiveLayout();

  if (initialBg) {
    const bgProbe = new Image();
    bgProbe.onload  = () => { updateBackgroundByFormat(); };
    bgProbe.onerror = () => { console.warn('Fondo no encontrado:', initialBg); };
    bgProbe.src = initialBg;
  }

  /* QR */
  if (CONFIG.QR_IMAGE) {
    qrEl.onerror = () => {
      console.warn('QR no encontrado:', CONFIG.QR_IMAGE);
      qrEl.onerror = null;
      qrEl.src = generateQRPlaceholder();
    };
    qrEl.src = CONFIG.QR_IMAGE;
  } else {
    qrEl.src = generateQRPlaceholder();
  }

  document.getElementById('qrSubLabel').textContent = CONFIG.QR_SUBLABEL || '';
  document.getElementById('btnStart').addEventListener('click', startGame);
  document.getElementById('btnRestart').addEventListener('click', restartGame);
})();

function generateQRPlaceholder() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="340" height="340" viewBox="0 0 340 340">
    <rect width="340" height="340" fill="#0d1b4b" rx="12"/>
    <rect x="20" y="20" width="120" height="120" rx="8" fill="none" stroke="#00d4ff" stroke-width="8"/>
    <rect x="40" y="40" width="80" height="80" rx="4" fill="#00d4ff" opacity=".8"/>
    <rect x="200" y="20" width="120" height="120" rx="8" fill="none" stroke="#00d4ff" stroke-width="8"/>
    <rect x="220" y="40" width="80" height="80" rx="4" fill="#00d4ff" opacity=".8"/>
    <rect x="20" y="200" width="120" height="120" rx="8" fill="none" stroke="#00d4ff" stroke-width="8"/>
    <rect x="40" y="220" width="80" height="80" rx="4" fill="#00d4ff" opacity=".8"/>
    <rect x="150" y="150" width="40" height="40" rx="4" fill="#fbed64" opacity=".9"/>
    <rect x="200" y="150" width="16" height="16" rx="2" fill="#00d4ff" opacity=".7"/>
    <rect x="224" y="150" width="16" height="16" rx="2" fill="#ff09e3" opacity=".7"/>
    <rect x="200" y="174" width="40" height="16" rx="2" fill="#00d4ff" opacity=".6"/>
    <rect x="200" y="200" width="16" height="16" rx="2" fill="#fbed64" opacity=".7"/>
    <rect x="150" y="200" width="40" height="16" rx="2" fill="#ff09e3" opacity=".5"/>
    <text x="170" y="310" text-anchor="middle" fill="rgba(255,255,255,0.4)"
          font-family="monospace" font-size="13">Agrega tu QR en CONFIG.QR_IMAGE</text>
  </svg>`;
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

/* ============================================================
   UTILIDADES
   ============================================================ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen')
    .forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============================================================
   ESTADO DEL JUEGO
   ============================================================ */
let state = {
  questions:       [],
  currentQ:        0,
  score:           0,
  answered:        false,
  countdownTimer:  null,
  nextTimer:       null,
};

/* ============================================================
   FLUJO PRINCIPAL
   ============================================================ */
function startGame() {
  state.questions = shuffle(QUESTION_BANK).map(q => {
    const shuffledOptions = shuffle(q.options);
    const correctIdx = shuffledOptions.indexOf(q.correctText);
    return {
      category:    q.category,
      text:        q.text,
      options:     shuffledOptions,
      correct:     correctIdx,
      explanation: q.explanation,
    };
  });
  state.currentQ = 0;
  state.score    = 0;
  state.answered = false;
  document.getElementById('scoreDisplay').textContent = '0';
  showScreen('screen-question');
  loadQuestion();
}

function restartGame() { startGame(); }

function loadQuestion() {
  state.answered = false;
  clearTimers();

  const q     = state.questions[state.currentQ];
  const total = state.questions.length;

  document.getElementById('qNumDisplay').textContent   = state.currentQ + 1;
  document.getElementById('qTotalDisplay').textContent = total;
  document.getElementById('progressBar').style.width   =
    ((state.currentQ / total) * 100) + '%';

  const card = document.getElementById('questionCard');
  card.classList.remove('q-enter');
  void card.offsetWidth;
  card.classList.add('q-enter');

  document.getElementById('qCategory').textContent = q.category;
  document.getElementById('qText').textContent     = q.text;

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.setAttribute('data-index', i);
    btn.innerHTML = `<div class="answer-text">${opt}</div>`;
    btn.style.animation      = 'fadeUp .4s ease both';
    btn.style.animationDelay = (i * .08) + 's';
    btn.addEventListener('click', e => handleAnswer(i, e));
    grid.appendChild(btn);
  });

  startCountdown(CONFIG.QUESTION_TIME);
}

/* ============================================================
   MANEJO DE RESPUESTA
   ============================================================ */
function handleAnswer(chosenIdx, event) {
  if (state.answered) return;
  state.answered = true;
  clearTimers();

  const q       = state.questions[state.currentQ];
  const buttons = document.querySelectorAll('.answer-btn');
  const isOk    = chosenIdx === q.correct;

  if (event && event.clientX) createRipple(event, buttons[chosenIdx]);

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct)       btn.classList.add('correct');
    else if (i === chosenIdx)  btn.classList.add('wrong');
    else                       btn.classList.add('dimmed');
  });

  if (isOk) {
    state.score++;
    const sv = document.getElementById('scoreDisplay');
    sv.textContent = state.score;
    sv.classList.remove('pop');
    void sv.offsetWidth;
    sv.classList.add('pop');
    spawnParticles(event, '#fbed64');
  } else {
    spawnParticles(event, '#ff3860');
  }

  showFeedback(isOk);
  showExplanation(q.explanation);

  state.nextTimer = setTimeout(() => {
    hideFeedback();
    hideExplanation();
    if (state.currentQ < state.questions.length - 1) {
      state.currentQ++;
      loadQuestion();
    } else {
      showResults();
    }
  }, 3200);
}

function timeUp() {
  if (state.answered) return;
  state.answered = true;
  clearTimers();

  const q = state.questions[state.currentQ];
  document.querySelectorAll('.answer-btn').forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.add(i === q.correct ? 'correct' : 'dimmed');
  });

  showFeedback(false, true);
  showExplanation(q.explanation);

  state.nextTimer = setTimeout(() => {
    hideFeedback();
    hideExplanation();
    if (state.currentQ < state.questions.length - 1) {
      state.currentQ++;
      loadQuestion();
    } else {
      showResults();
    }
  }, 3200);
}

/* ============================================================
   TECLADO: teclas 1-4 para respuestas, Espacio para comenzar
   ============================================================ */
document.addEventListener('keydown', e => {
  const key = e.key;
  if (!document.getElementById('screen-question').classList.contains('active')) return;
  if (state.answered) return;
  const map = { '1': 0, '2': 1, '3': 2, '4': 3 };
  if (key in map) {
    const idx  = map[key];
    const btns = document.querySelectorAll('.answer-btn');
    if (btns[idx]) {
      const rect = btns[idx].getBoundingClientRect();
      handleAnswer(idx, {
        clientX: rect.left + rect.width  / 2,
        clientY: rect.top  + rect.height / 2,
      });
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.key !== ' ' && e.code !== 'Space') return;
  e.preventDefault();
  if (document.getElementById('screen-welcome').classList.contains('active')) {
    document.getElementById('btnStart').click();
  } else if (document.getElementById('screen-results').classList.contains('active')) {
    document.getElementById('btnRestart').click();
  }
});

/* ============================================================
   CUENTA REGRESIVA
   ============================================================ */
const CIRCUMFERENCE = 2 * Math.PI * 30;

function startCountdown(seconds) {
  const ring   = document.getElementById('countdownRing');
  const fillEl = document.getElementById('countdownFill');
  const numEl  = document.getElementById('countdownNum');
  ring.style.display = 'block';
  let remaining = seconds;
  numEl.textContent           = remaining;
  fillEl.style.strokeDashoffset = '0';

  state.countdownTimer = setInterval(() => {
    remaining--;
    numEl.textContent = remaining;
    fillEl.style.strokeDashoffset =
      CIRCUMFERENCE * (1 - remaining / CONFIG.QUESTION_TIME);
    const danger = remaining <= Math.ceil(CONFIG.QUESTION_TIME * 0.33);
    fillEl.style.stroke = danger ? '#ff3860' : '#00d4ff';
    numEl.style.color   = danger ? '#ff3860' : '#00d4ff';
    if (remaining <= 0) {
      clearInterval(state.countdownTimer);
      ring.style.display = 'none';
      timeUp();
    }
  }, 1000);
}

function clearTimers() {
  clearInterval(state.countdownTimer);
  clearTimeout(state.nextTimer);
  const ring = document.getElementById('countdownRing');
  ring.style.display = 'none';
  document.getElementById('countdownFill').style.stroke = '#00d4ff';
  document.getElementById('countdownNum').style.color   = '#00d4ff';
}

/* ============================================================
   MENSAJES DE FEEDBACK
   ============================================================ */
const MSG_CORRECT = ['¡CORRECTO!', '¡EXACTO!', '¡BRILLANTE!', '¡ASÍ SE HACE!'];
const MSG_WRONG   = ['¡INCORRECTO!', '¡OPS!', 'SIGUE INTENTANDO'];

function showFeedback(isOk, timeOut = false) {
  const overlay = document.getElementById('feedbackOverlay');
  const msg     = document.getElementById('feedbackMsg');
  if (timeOut) {
    msg.className   = 'feedback-msg wrong-msg';
    msg.textContent = '⏱ ¡TIEMPO!';
  } else if (isOk) {
    msg.className   = 'feedback-msg correct-msg';
    msg.textContent = '✓ ' + MSG_CORRECT[Math.floor(Math.random() * MSG_CORRECT.length)];
  } else {
    msg.className   = 'feedback-msg wrong-msg';
    msg.textContent = '✗ ' + MSG_WRONG[Math.floor(Math.random() * MSG_WRONG.length)];
  }
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 2000);
}
function hideFeedback()    { document.getElementById('feedbackOverlay').classList.remove('show'); }
function showExplanation(t){ document.getElementById('explanationText').textContent = t;
                             document.getElementById('explanationBox').classList.add('show'); }
function hideExplanation() { document.getElementById('explanationBox').classList.remove('show'); }

/* ============================================================
   PANTALLA DE RESULTADOS
   ============================================================ */
function showResults() {
  const total = state.questions.length;
  const score = state.score;
  const pct   = score / total;

  document.getElementById('finalScoreNum').textContent   = score;
  document.getElementById('finalScoreTotal').textContent = '/ ' + total;

  const deg = Math.round(pct * 360);
  document.getElementById('scoreCircleBg').style.background =
    `conic-gradient(#fbed64 ${deg}deg, rgba(7,91,138,0.3) 0%)`;

  const levels = [
    { min: 1.0, e: '🏆', t: '¡Perfecto!',       d: 'Eres un experto del ecosistema digital colombiano.' },
    { min: 0.8, e: '🚀', t: '¡Excelente!',       d: 'Dominas el emprendimiento digital. ¡Sigue así!'    },
    { min: 0.6, e: '💡', t: '¡Muy bien!',        d: 'Tienes una base sólida. ¡Sigue aprendiendo!'       },
    { min: 0.4, e: '📈', t: '¡Buen inicio!',     d: 'Vas por buen camino hacia la innovación digital.'  },
    { min: 0,   e: '🌱', t: '¡Sigue creciendo!', d: 'El aprendizaje es parte del camino emprendedor.'   },
  ];
  const lvl = levels.find(l => pct >= l.min);
  document.getElementById('resultEmoji').textContent = lvl.e;
  document.getElementById('resultText').textContent  = lvl.t;
  document.getElementById('resultDesc').textContent  = lvl.d;
  document.getElementById('progressBar').style.width = '100%';

  showScreen('screen-results');
  spawnBurstParticles();
}

/* ============================================================
   PARTÍCULAS Y EFECTOS VISUALES
   ============================================================ */
function createRipple(event, btn) {
  const rect = btn.getBoundingClientRect();
  const r    = document.createElement('span');
  r.className = 'ripple';
  const size = Math.max(rect.width, rect.height) * 2;
  r.style.cssText = `
    width:${size}px; height:${size}px;
    left:${event.clientX - rect.left - size / 2}px;
    top:${event.clientY  - rect.top  - size / 2}px;`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

function spawnParticles(event, color) {
  const wrap = document.getElementById('particlesWrap');
  const { x, y } = (event && event.clientX != null)
    ? toStage(event.clientX, event.clientY)
    : { x: DESIGN_W / 2, y: DESIGN_H / 2 };

  const palette = color === '#fbed64'
    ? ['#fbed64', '#f9c200', '#ffffff', '#00d4ff']
    : ['#ff3860', '#ff09e3', '#ffffff', '#ff6b6b'];

  for (let i = 0; i < 22; i++) {
    const p    = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 12 + 4;
    const ang  = Math.random() * 360;
    const dist = Math.random() * 220 + 80;
    const tx   = Math.cos(ang * Math.PI / 180) * dist;
    const ty   = Math.sin(ang * Math.PI / 180) * dist;
    const dur  = Math.random() * 600 + 400;
    const c    = palette[Math.floor(Math.random() * palette.length)];
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${x}px; top:${y}px; background:${c};
      --tx:${tx}px; --ty:${ty}px;
      animation: particleFly ${dur}ms ease-out forwards;`;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), dur + 50);
  }
}

function spawnBurstParticles() {
  for (let b = 0; b < 8; b++) {
    setTimeout(() => {
      const sx   = Math.random() * DESIGN_W;
      const sy   = Math.random() * DESIGN_H;
      const rect = stageEl.getBoundingClientRect();
      spawnParticles({
        clientX: rect.left + sx * currentScale,
        clientY: rect.top  + sy * currentScale,
      }, '#fbed64');
    }, b * 200);
  }
}
</script>
